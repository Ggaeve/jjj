<!DOCTYPE html>
<html lang="eng">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale="1.0>
    <title>Movie Collection</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: #141414;
            color: white;
        }

        header{
            background: #000;
            padding: 20px 60px;
        }

        .logo{
            color: #E50914;
            font-size: 35PX;
            font-weight: bold;
        }

        .container{
            width: 90px;
            margin: auto;
            padding: 40px 0;
        }

        h2{
            text-align: center;
            margin-bottom: 30px;
            font-size: 42px
        }

        .movies{
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
            gap: 25px;
        }

        .card{
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            transition: .3s;
            box-shadow: 0 0 15px rgba(0,0,0.4);
        }

        .card:hover{
            transform: scale(1.08)
        }

        .card h3{
            padding: 15px 10px 5px;
            text-align: center;
        }

        .card p{
            text-align: center;
            color: #bbb;
            padding-bottom: 15px;
            font-size: 14px;
        }

        footer{
            text-align: center;
        }
    </style>
</html>
