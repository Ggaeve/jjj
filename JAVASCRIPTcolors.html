<!DOCTYPE html>
<html></html>
<head>
    <title>Index</title>

    <head>
        <style>
            .container{
                width: 100%;
                height: 700px;
                background-color: rgb(216, 241, 145);
                display: grid;
                grid-template-columns: 25% 25% 25%;
                grid-template-rows: 100px 300px;
                gap: 10px;
            }

            .box{
                width: 100px;
                height: 100px;
            }

            .red{
                background-color: red;
            }

            .green{
                background-color: green;
            }

            .blue{
background-color: blue;
            }

        </style>
    </head>
</body>
</head>

<div class="container">
    <div class="red"></div>
    <div class="green"></div>
    <div class="blue"></div>
</div>
