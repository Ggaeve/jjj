<!DOCTYPE html>
<html lang="eng">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale="1.0>
    <title>Movie Collection</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: #141414;
            color: white;
        }

        header{
            background: #000;
            padding: 20px 60px;
        }

        .logo{
            color: #E50914;
            font-size: 35PX;
            font-weight: bold;
        }

        h2{
            text-align: center;
            margin-bottom: 30px;
            font-size: 42px
        }

        .movies{

            display: flex;
            width: 100%;
    justify-content: space-evenly;
            gap: 25px;
        }

        .card{
            background: #222;
            width: 300px;
            border-radius: 10px;
            overflow: hidden;
            transition: .3s;
            box-shadow: 0 0 15px rgba(0,0,0.4);
        }

        .card:hover{
            transform: scale(1.08)
        }

        .card img{
            width: 100%;
            height: 250px;
            border-radius: 6px;
            object-fit: cover;
            transition: .3s;
        }

        .card h3{
            padding: 15px 10px 5px;
            text-align: center;
        }

        .card p{
            text-align: center;
            color: #bbb;
            padding-bottom: 15px;
            font-size: 14px;
        }

        footer{
            text-align: center;
            padding: 30px;
            color: #888;
        }

       
      
    </style>

    </head>

    <body>

    <header>
    <div class="logo">NUTFLIX</div>
</header>

<div class="container">

    <h2>Movie Collection</h2>

    <div class="movies">

        <div class="card">

            <img src="https://i.mydramalist.com/73Jq1j_4c.jpg?v=1">
            <h3>Girl Rules</h3>
            <p>Drama</p>
            </div>

            <div class="card">
                <img src="https://i.mydramalist.com/YYVRvd_4c.jpg?v=1">
                <h3>Love Design</h3>
                <p>Drama - Comedy</p>
            </div>

            <div class="card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQz0lVgparthBaqoY7JaOWDzvBHUzXp8nO0Y_YDJpdX6FcOrD_f4VFjdN_Qupv2SOIISwPZmg&s=10">
                <h3>Dead Poets Society</h3>
                <p>Drama</p>
            </div>

            <div class="card">
                <img src="https://i.mydramalist.com/Px61q8_4c.jpg?v=1">
                <h3>Ticket To Heaven</h3>
                <p>Drama</p>
            </div>
</html>
